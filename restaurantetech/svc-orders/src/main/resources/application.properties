spring.application.name=svc-orders
server.port=8082

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:db_orders}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

menu.service.url=${MENU_SERVICE_URL:http://localhost:8081}
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8083}
