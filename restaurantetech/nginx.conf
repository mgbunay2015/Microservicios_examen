events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;  # Docker's internal DNS, re-resolve every 10s

    upstream svc_menu {
        server svc-menu:8081;
    }

    upstream svc_orders {
        server svc-orders:8082;
    }

    upstream svc_inventory {
        server svc-inventory:8083;
    }

    server {
        listen 8080;

        location /api/menu {
            proxy_pass http://svc_menu;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/pedidos {
            proxy_pass http://svc_orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/inventario {
            proxy_pass http://svc_inventory;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
