services:
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      svc-menu:
        condition: service_started
      svc-orders:
        condition: service_started
      svc-inventory:
        condition: service_started
    networks:
      - restaurantetech-net

  db-menu:
    image: postgres:16-alpine
    container_name: db-menu
    environment:
      POSTGRES_DB: db_menu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_menu_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_menu"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - restaurantetech-net

  svc-menu:
    build: ./svc-menu
    container_name: svc-menu
    environment:
      DB_HOST: db-menu
      DB_PORT: 5432
      DB_NAME: db_menu
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db-menu:
        condition: service_healthy
    networks:
      - restaurantetech-net

  db-orders:
    image: postgres:16-alpine
    container_name: db-orders
    environment:
      POSTGRES_DB: db_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - db_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_orders"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - restaurantetech-net

  svc-orders:
    build: ./svc-orders
    container_name: svc-orders
    environment:
      DB_HOST: db-orders
      DB_PORT: 5432
      DB_NAME: db_orders
      DB_USER: postgres
      DB_PASSWORD: postgres
      MENU_SERVICE_URL: http://svc-menu:8081
      INVENTORY_SERVICE_URL: http://svc-inventory:8083
    depends_on:
      db-orders:
        condition: service_healthy
      svc-menu:
        condition: service_started
      svc-inventory:
        condition: service_started
    networks:
      - restaurantetech-net

  db-inventory:
    image: postgres:16-alpine
    container_name: db-inventory
    environment:
      POSTGRES_DB: db_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - db_inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - restaurantetech-net

  svc-inventory:
    build: ./svc-inventory
    container_name: svc-inventory
    environment:
      DB_HOST: db-inventory
      DB_PORT: 5432
      DB_NAME: db_inventory
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db-inventory:
        condition: service_healthy
    networks:
      - restaurantetech-net

networks:
  restaurantetech-net:
    driver: bridge

volumes:
  db_menu_data:
  db_orders_data:
  db_inventory_data:
